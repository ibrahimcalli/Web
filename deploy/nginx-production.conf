# ═══════════════════════════════════════════════════════════════════════════
# NGINX PRODUCTION CACHE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
#
# Kullanım:
#   Bu dosya öneri amaçlıdır. Mevcut nginx.conf dosyanızı BOZMAZ.
#   Eklemek için: deploy/nginx.conf içine aşağıdaki blokları uygun yere copy-paste edin.
#
# Özellikler:
#   - Cache-Control: public, immutable (1 yıl)
#   - ETag (nginx default)
#   - Expires header
#   - gzip sıkıştırma
#   - Brotli (modül varsa)
#   - Static assets uzun cache
#   - HTML short cache (stale while revalidate)
#
# ═══════════════════════════════════════════════════════════════════════════

# ── GZIP Sıkıştırma ───────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/ld+json
    image/svg+xml
    application/x-font-ttf
    font/ttf
    font/opentype
    image/x-icon;

# ── Brotli sıkıştırma (modül yüklü ise) ──────────────────────────────────
# Nginx brotli modülü kurulmalı: nginx-mod-brotli (Debian/Ubuntu)
# Veya derlenmiş: --with-brotli
# Kontrol: nginx -V 2>&1 | grep brotli

# brotli on;
# brotli_comp_level 5;
# brotli_min_length 256;
# brotli_types
#     text/plain
#     text/css
#     text/javascript
#     application/json
#     application/javascript
#     text/xml
#     application/xml
#     image/svg+xml
#     application/ld+json;

# ── Cache-Control: Statik Yapılar ─────────────────────────────────────────
# Hash'li dosyalar (.min.css, .min.js) yıl boyunca immutable cache
location ~* \.(min\.(css|js))$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Vary "Accept-Encoding";
    expires 1y;
    access_log off;
}

# Genel static dosyalar (imgs, fonts, icons)
location ~* \.(woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|avif|svg|mp4|webm|pdf)$ {
    add_header Cache-Control "public, max-age=2592000";
    add_header Vary "Accept-Encoding";
    expires 30d;
    access_log off;
}

# Manifest ve service worker — short cache
location = /manifest.json {
    add_header Cache-Control "public, max-age=86400";
    expires 24h;
}

location = /sw.js {
    add_header Cache-Control "public, max-age=3600";
    expires 1h;
    add_header Service-Worker-Allowed "/";
}

# Sitemap ve robots — medium cache
location ~ ^/(sitemap.*\.xml|robots\.txt)$ {
    add_header Cache-Control "public, max-age=86400";
    expires 24h;
    access_log off;
}

# ── ETAG (Docker/cloudflare arkasında) ─────────────────────────────────────
# Nginx default ETag üretir ancak bunu disable edebiliriz
etag off;  # Cloudflare arkasındaysanız kapatın, kendini üretir

# ── Uploads (kullanıcı yüklemiş dosyalar) ─────────────────────────────────
location /static/uploads/ {
    add_header Cache-Control "public, max-age=604800";
    expires 7d;
    access_log off;
    # Path'lerde traversal engelleme
    if ($request_uri ~ "..*") { return 403; }
}

# ── HTML sayfalar — short cache (stale while revalidate destekli) ──────────
location / {
    add_header Cache-Control "no-cache, must-revalidate";
    add_header X-Cache-Status "MISS";
    expires 5m;
}

# ── Cache Purge (admin tarafından) ─────────────────────────────────────────
# Cloudflare üzerinden cache purge kullanılabilir:
# location ~ /purge(/.*) {
#     allow 127.0.0.1;
#     deny all;
#     proxy_cache_bypass $arg_bypass;
# }

# ═══════════════════════════════════════════════════════════════════════════
# NOT: Aşağıdaki kısımlar mevcut nginx.conf zaten yapılandırılmış olabilir.
#      Sadece eksikse ekleyin. Tekrar etmeyin.
# ═══════════════════════════════════════════════════════════════════════════

# HTTP/2 desteği (önerilir)
# listen 443 ssl http2;

# HTTP/2 server push (off; güvenlik açığı oluşturabilir)
# http2_push_preload off;

# Bağlantı coalescing
# http2_max_requests 1000;

# FastCGI cache (varsa)
# fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m;
# fastcgi_cache_key "$scheme$request_method$host$request_uri";

# Open file cache
open_file_cache max=1000 inactive=20s valid=1m min_uses=2;
open_file_cache_errors on;
open_file_cache_min_uses 1;
