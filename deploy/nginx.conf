# ═══════════════════════════════════════════════════════════════
#  Portföy Gayrimenkul — Nginx Yapılandırması
#  Dosya: /etc/nginx/sites-available/portfoy-web
#  Aktifleştir: ln -s /etc/nginx/sites-available/portfoy-web /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════

# HTTP → HTTPS yönlendirme (certbot bu bloğu otomatik günceller)
server {
    listen 80;
    listen [::]:80;
    server_name portfoygayrimenkul.com.tr www.portfoygayrimenkul.com.tr;

    # Certbot doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # HTTP'yi HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Ana Blok
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portfoygayrimenkul.com.tr www.portfoygayrimenkul.com.tr;

    # SSL — certbot tarafından doldurulur
    # ssl_certificate     /etc/letsencrypt/live/portfoygayrimenkul.com.tr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/portfoygayrimenkul.com.tr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Loglama
    access_log /var/log/nginx/portfoy_access.log;
    error_log  /var/log/nginx/portfoy_error.log;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy "strict-origin"     always;
    add_header X-XSS-Protection "1; mode=block"   always;

    # Yükleme boyutu (resimler için)
    client_max_body_size 20M;

    # ── Statik dosyalar (Nginx doğrudan servis eder) ─────────
    location /static/ {
        alias /opt/portfoy_web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Resim optimizasyonu
        location ~* \.(jpg|jpeg|png|webp|gif|ico)$ {
            expires 60d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API istekleri ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # CORS (gerekirse)
        # add_header Access-Control-Allow-Origin "*";
    }

    # ── SPA Ana Route ────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Gzip
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json
                   application/javascript text/xml application/xml;
    }
}
