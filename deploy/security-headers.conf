# ═══════════════════════════════════════════════════════════════════════════
# NGINX SECURITY HEADERS PRODUCTION
# ═══════════════════════════════════════════════════════════════════════════
#
# Kullanım:
#   deploy/nginx.conf içinde uygun bir location/server blok'a copy-paste edin.
#   Mevcut nginx'i BOZMAZ, sadece ek başlıklar sağlar.
#
# İçerdiği başlıklar:
#   1. Strict-Transport-Security (HSTS)
#   2. Content-Security-Policy (CSP)
#   3. Referrer-Policy
#   4. Permissions-Policy
#   5. X-Frame-Options
#   6. X-Content-Type-Options
#   7. Cross-Origin-Embedder-Policy (COEP)
#   8. Cross-Origin-Opener-Policy (COOP)
#   9. Cross-Origin-Resource-Policy (CORP)
#   10. X-XSS-Protection (legacy)
#
# ═══════════════════════════════════════════════════════════════════════════

# ── Tüm response'lar için güvenlik başlıkları ─────────────────────────────
# server ayarına ekleyebilir veya location içine kopyalayabilirsiniz

# 1. HSTS — Sadece HTTPS üzerinden gelen trafiği kabul et
# (Yalnızca production'da, ilk 6 ay sonra 'max-age=31536000' artırın)
add_header Strict-Transport-Security "max-age=2592000; includeSubDomains; preload" always;

# 2. Content-Security-Policy
# - 'self' aynı kaynağa izin verir
# - 'unsafe-inline' / 'unsafe-eval' içermez (script-src'de)
# - Google Fonts için fonts.gstatic.com ve data: URI'ler
# - Backend API aynı origin (relative URL)
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://www.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;
    img-src 'self' data: blob: https: http:;
    connect-src 'self' https:;
    worker-src 'self';
    manifest-src 'self';
    media-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    upgrade-insecure-requests
" always;

# 3. Referrer-Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 4. Permissions-Policy
add_header Permissions-Policy "
    camera=(),
    microphone=(),
    geolocation=(),
    gyroscope=(),
    magnetometer=(),
    accelerometer=(),
    payment=(),
    usb=(),
    midi=(),
    notifications=()
" always;

# 5. X-Frame-Options (Clickjacking savunması)
add_header X-Frame-Options "DENY" always;

# 6. X-Content-Type-Options (MIME Sniffing savunması)
add_header X-Content-Type-Options "nosniff" always;

# 7. Cross-Origin-Embedder-Policy
add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

# 8. Cross-Origin-Opener-Policy
add_header Cross-Origin-Opener-Policy "same-origin" always;

# 9. Cross-Origin-Resource-Policy
add_header Cross-Origin-Resource-Policy "cross-origin" always;

# 10. X-XSS-Protection (Legacy — modern tarayıcılar için YOK sayılır)
add_header X-XSS-Protection "1; mode=block" always;

# ── Server Token kapatma (bilgi sızdırma önleme) ──────────────────────────
server_tokens off;

